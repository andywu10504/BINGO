<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 遊戲</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .controls-section {
            padding: 20px;
        }

        .board-section {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bingo-board {
            display: grid;
            gap: 8px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
        }

        .bingo-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: clamp(12px, 4vw, 20px);
            font-weight: bold;
            cursor: pointer;
            background-color: white;
            color: #333;
            transition: all 0.2s ease;
            user-select: none;
            padding: 8px;
            text-align: center;
            aspect-ratio: 1;
            min-height: 0;
        }

        .bingo-cell-icon {
            font-size: clamp(20px, 8vw, 32px);
            color: #0d6efd;
        }

        .bingo-cell-text {
            font-size: clamp(10px, 3vw, 14px);
            line-height: 1.2;
        }

        .bingo-cell:hover {
            border-color: #0d6efd;
            background-color: #f0f7ff;
        }

        .bingo-cell.marked {
            background-color: #198754;
            border-color: #198754;
            color: white;
        }

        .bingo-cell.marked .bingo-cell-icon {
            color: white;
        }

        .status-badge {
            font-size: 18px;
            font-weight: bold;
        }

        .status-badge.bingo {
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- NavBar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-dice"></i> BINGO 遊戲
            </span>
            <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#settingsModal">
                <i class="fa-solid fa-gear"></i> 設定
            </button>
        </div>
    </nav>

    <!-- 設定模態框 -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="settingsModalLabel">遊戲設定</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="gameMode" class="form-label">遊戲模式</label>
                        <select class="form-select" id="gameMode">
                            <option value="emt">EMT 模式</option>
                            <option value="numbers">數字模式</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="minNumber" class="form-label">數字最小值</label>
                        <input type="number" class="form-control" id="minNumber" value="1" min="1">
                    </div>
                    <div class="mb-3">
                        <label for="maxNumber" class="form-label">數字最大值</label>
                        <input type="number" class="form-control" id="maxNumber" value="75" min="1">
                    </div>
                    <div class="mb-3">
                        <label for="boardCols" class="form-label">列數</label>
                        <input type="number" class="form-control" id="boardCols" value="5" min="3" max="10">
                    </div>
                    <div class="mb-3">
                        <label for="boardRows" class="form-label">行數</label>
                        <input type="number" class="form-control" id="boardRows" value="5" min="3" max="10">
                    </div>
                    <div class="mb-3">
                        <label for="winLine" class="form-label">需要完成幾條線才算 BINGO</label>
                        <input type="number" class="form-control" id="winLine" value="5" min="1" max="20">
                    </div>
                    <div class="form-text">
                        例如：設定 5，代表要累積完成 5 條完整連線才算贏。
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="saveSettingsBtn">保存設定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主要內容 -->
    <main class="flex-grow-1 d-flex flex-column">
        <!-- 第二行：BINGO 版 -->
        <div class="board-section flex-grow-1">
            <div class="bingo-board" id="bingoBoard"></div>
        </div>

        <!-- 第三行：控制區 -->
        <div class="controls-section bg-white border-top">
            <div class="container-fluid text-center">
                <div class="mb-3">
                    <span class="badge text-bg-primary status-badge" id="lineStatus">
                        目前連線數：0 / 5
                    </span>
                </div>

                <button class="btn btn-success btn-lg" id="startBtn">
                    <i class="fa-solid fa-play"></i> 開始遊戲
                </button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const EMT_ITEMS = [
            { text: '高醫', icon: 'fa-hospital' },
            { text: '阮綜合醫院', icon: 'fa-hospital' },
            { text: '大同醫院', icon: 'fa-hospital' },
            { text: '下雨天協勤', icon: 'fa-cloud-rain' },
            { text: '內科OHCA', icon: 'fa-heart' },
            { text: 'Trauma OHCA', icon: 'fa-user-injured' },
            { text: '聖功醫院', icon: 'fa-hospital' },
            { text: '長庚醫院', icon: 'fa-hospital' },
            { text: '榮民總醫院', icon: 'fa-hospital' },
            { text: '車上CPR', icon: 'fa-car' },
            { text: '凱旋醫院', icon: 'fa-hospital' },
            { text: '民生醫院', icon: 'fa-hospital' },
            { text: '遇到精神病患', icon: 'fa-brain' },
            { text: '強制送醫使用約束帶', icon: 'fa-link' },
            { text: '解鎖燒燙傷', icon: 'fa-fire' },
            { text: '火警救護', icon: 'fa-fire' },
            { text: '小飛俠', icon: 'fa-user-secret' },
            { text: '晴天娃娃', icon: 'fa-sun' },
            { text: '打撈', icon: 'fa-water' },
            { text: '明顯死亡(屍僵屍腐)', icon: 'fa-skull' },
            { text: '明顯死亡(頭首分離)', icon: 'fa-skull' },
            { text: '急產接生', icon: 'fa-baby' },
            { text: '脫襪式傷口', icon: 'fa-bandage' },
            { text: '低血糖', icon: 'fa-flask' },
            { text: '低血壓', icon: 'fa-heart-pulse' },
            { text: '瀕死式呼吸', icon: 'fa-lung' },
            { text: '耳漏鼻漏', icon: 'fa-head-side-virus' },
            { text: '執行辛辛那提異常', icon: 'fa-brain' },
            { text: 'EKG', icon: 'fa-heart-pulse' },
            { text: '血糖', icon: 'fa-flask' },
            { text: '備IV', icon: 'fa-syringe' },
            { text: '上頸圈', icon: 'fa-shirt' },
            { text: '翻身上長背板', icon: 'fa-person-walking' },
            { text: '破門', icon: 'fa-door-open' },
            { text: '正確使用器材給氧', icon: 'fa-mask' },
            { text: 'BVM給氧', icon: 'fa-mask' },
            { text: '進階呼吸道給氧', icon: 'fa-mask' },
            { text: '架設LUCAS', icon: 'fa-robot' },
            { text: '使用電動擔架', icon: 'fa-wheelchair' },
            { text: '使用搬運椅', icon: 'fa-chair' },
            { text: '使用傳統擔架', icon: 'fa-stretcher' },
            { text: '抽吸式護木', icon: 'fa-dumpster' },
            { text: '斷肢', icon: 'fa-hand' },
            { text: '發燒', icon: 'fa-thermometer' },
            { text: '急性心肌梗塞(MI)', icon: 'fa-heart-crack' },
            { text: '慢性阻塞性肺病(COPD)', icon: 'fa-lungs' },
            { text: '非OHCA GCS 3分', icon: 'fa-brain' },
            { text: '一氧化碳中毒', icon: 'fa-fire' },
            { text: '線上派遣', icon: 'fa-phone' },
            { text: '醫師線上指導', icon: 'fa-stethoscope' },
            { text: '酒醉路到', icon: 'fa-bottle-water' },
            { text: '吸毒過量', icon: 'fa-eye-slash' },
            { text: '自殘', icon: 'fa-hand-fist' },
            { text: '同時有3個以上傷患', icon: 'fa-people-group' },
            { text: '獨自評估患者', icon: 'fa-person' },
            { text: '獨自處置患者', icon: 'fa-person' },
            { text: '頭部外傷 GCS小於15', icon: 'fa-head-side-virus' },
            { text: '骨盆不穩定', icon: 'fa-skeleton' }
        ];

        class BingoGame {
            constructor() {
                this.boardRows = 5;
                this.boardCols = 5;
                this.minNumber = 1;
                this.maxNumber = 75;
                this.winLine = 5;
                this.gameMode = 'numbers';
                this.numbers = [];
                this.marked = [];
                this.gameStarted = false;

                this.loadFromLocalStorage();
                this.init();
            }

            loadFromLocalStorage() {
                const saved = localStorage.getItem('bingoSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    this.boardRows = parseInt(settings.boardRows) || 5;
                    this.boardCols = parseInt(settings.boardCols) || 5;
                    this.minNumber = parseInt(settings.minNumber) || 1;
                    this.maxNumber = parseInt(settings.maxNumber) || 75;
                    this.winLine = parseInt(settings.winLine) || 5;
                    this.gameMode = settings.gameMode || 'numbers';
                }

                $('#minNumber').val(this.minNumber);
                $('#maxNumber').val(this.maxNumber);
                $('#boardCols').val(this.boardCols);
                $('#boardRows').val(this.boardRows);
                $('#winLine').val(this.winLine);
                $('#gameMode').val(this.gameMode);
            }

            saveToLocalStorage() {
                const settings = {
                    boardRows: this.boardRows,
                    boardCols: this.boardCols,
                    minNumber: this.minNumber,
                    maxNumber: this.maxNumber,
                    winLine: this.winLine,
                    gameMode: this.gameMode
                };
                localStorage.setItem('bingoSettings', JSON.stringify(settings));
            }

            init() {
                this.loadSettings();
                this.generateNumbers();
                this.renderBoard();
                this.updateLineStatus();
                this.gameStarted = true;
                this.bindEvents();
            }

            loadSettings() {
                const minNumber = parseInt($('#minNumber').val(), 10);
                const maxNumber = parseInt($('#maxNumber').val(), 10);
                const boardCols = parseInt($('#boardCols').val(), 10);
                const boardRows = parseInt($('#boardRows').val(), 10);
                const winLine = parseInt($('#winLine').val(), 10);
                const gameMode = $('#gameMode').val();

                if (!Number.isNaN(minNumber) && !Number.isNaN(maxNumber) && minNumber < maxNumber) {
                    this.minNumber = minNumber;
                    this.maxNumber = maxNumber;
                }

                if (!Number.isNaN(boardCols) && !Number.isNaN(boardRows) && boardCols > 0 && boardRows > 0) {
                    this.boardCols = boardCols;
                    this.boardRows = boardRows;
                }

                if (!Number.isNaN(winLine) && winLine > 0) {
                    this.winLine = winLine;
                }

                this.gameMode = gameMode;
            }

            generateNumbers() {
                const totalCells = this.boardRows * this.boardCols;
                let items = [];

                if (this.gameMode === 'numbers') {
                    const range = this.maxNumber - this.minNumber + 1;

                    if (range < totalCells) {
                        alert('數字範圍不足以填滿所有格子！');
                        this.numbers = [];
                        this.marked = [];
                        return;
                    }

                    items = Array.from({ length: range }, (_, i) => ({
                        text: i + this.minNumber,
                        icon: ''
                    }));
                } else {
                    if (EMT_ITEMS.length < totalCells) {
                        alert('EMT 項目不足以填滿所有格子！');
                        this.numbers = [];
                        this.marked = [];
                        return;
                    }

                    items = [...EMT_ITEMS];
                }

                for (let i = items.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [items[i], items[j]] = [items[j], items[i]];
                }

                this.numbers = items.slice(0, totalCells);
                this.marked = new Array(totalCells).fill(false);
            }

            renderBoard() {
                const board = $('#bingoBoard');
                board.empty();

                board.css('grid-template-columns', `repeat(${this.boardCols}, 1fr)`);

                this.numbers.forEach((item, index) => {
                    const div = $('<div>')
                        .addClass('bingo-cell')
                        .attr('data-index', index);

                    if (this.gameMode === 'numbers') {
                        div.text(item.text);
                    } else {
                        const icon = $('<i>')
                            .addClass('bingo-cell-icon fa-solid')
                            .addClass(item.icon);

                        const text = $('<div>')
                            .addClass('bingo-cell-text')
                            .text(item.text);

                        div.append(icon, text);
                    }

                    if (this.marked[index]) {
                        div.addClass('marked');
                    }

                    board.append(div);
                });
            }

            bindEvents() {
                $('#startBtn').off('click').on('click', () => {
                    this.startGame();
                });

                $('#saveSettingsBtn').off('click').on('click', () => {
                    this.loadSettings();
                    this.generateNumbers();
                    this.renderBoard();
                    this.updateLineStatus();
                    this.gameStarted = true;
                    this.saveToLocalStorage();
                });

                $(document).off('click', '.bingo-cell').on('click', '.bingo-cell', (e) => {
                    if (!this.gameStarted) {
                        return;
                    }

                    const index = parseInt($(e.currentTarget).attr('data-index'), 10);
                    this.toggleCell(index);
                });
            }

            startGame() {
                this.loadSettings();
                this.generateNumbers();
                this.renderBoard();
                this.updateLineStatus();
                this.gameStarted = true;
                this.saveToLocalStorage();
            }

            toggleCell(index) {
                if (Number.isNaN(index) || index < 0 || index >= this.marked.length) {
                    return;
                }

                this.marked[index] = !this.marked[index];
                const cell = $(`[data-index="${index}"]`);

                if (this.marked[index]) {
                    cell.addClass('marked');
                } else {
                    cell.removeClass('marked');
                }

                this.saveToLocalStorage();
                this.checkBingo();
            }

            getCompletedLineCount() {
                let completedLines = 0;

                // 行
                for (let row = 0; row < this.boardRows; row++) {
                    let count = 0;
                    for (let col = 0; col < this.boardCols; col++) {
                        const index = row * this.boardCols + col;
                        if (this.marked[index]) {
                            count++;
                        }
                    }

                    if (count === this.boardCols) {
                        completedLines++;
                    }
                }

                // 列
                for (let col = 0; col < this.boardCols; col++) {
                    let count = 0;
                    for (let row = 0; row < this.boardRows; row++) {
                        const index = row * this.boardCols + col;
                        if (this.marked[index]) {
                            count++;
                        }
                    }

                    if (count === this.boardRows) {
                        completedLines++;
                    }
                }

                // 對角線只在正方形棋盤下計算
                if (this.boardRows === this.boardCols) {
                    let diag1Count = 0;
                    for (let i = 0; i < this.boardRows; i++) {
                        const index = i * this.boardCols + i;
                        if (this.marked[index]) {
                            diag1Count++;
                        }
                    }
                    if (diag1Count === this.boardRows) {
                        completedLines++;
                    }

                    let diag2Count = 0;
                    for (let i = 0; i < this.boardRows; i++) {
                        const index = i * this.boardCols + (this.boardCols - 1 - i);
                        if (this.marked[index]) {
                            diag2Count++;
                        }
                    }
                    if (diag2Count === this.boardRows) {
                        completedLines++;
                    }
                }

                return completedLines;
            }

            updateLineStatus() {
                const completedLines = this.getCompletedLineCount();
                $('#lineStatus').text(`目前連線數：${completedLines} / ${this.winLine}`);

                if (completedLines >= this.winLine) {
                    $('#lineStatus')
                        .removeClass('text-bg-primary')
                        .addClass('text-bg-success bingo');
                } else {
                    $('#lineStatus')
                        .removeClass('text-bg-success bingo')
                        .addClass('text-bg-primary');
                }
            }

            checkBingo() {
                const completedLines = this.getCompletedLineCount();
                this.updateLineStatus();

                if (completedLines >= this.winLine) {
                    this.winBingo();
                }
            }

            winBingo() {
                this.gameStarted = false;
                this.saveToLocalStorage();
                alert(`🎉 BINGO！已完成 ${this.getCompletedLineCount()} 條線！`);
            }
        }

        $(document).ready(function () {
            new BingoGame();
        });
    </script>
</body>
</html>
