<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BINGO Board</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
  <link href="css/index.css" rel="stylesheet">
</head>

<body>
  <canvas id="fireworksCanvas"></canvas>

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">
      <i class="fa-solid fa-table-cells-large me-2"></i>BINGO
    </span>

    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#settingModal">
      <i class="fa-solid fa-gear"></i>
    </button>
  </nav>

  <main class="main">
    <section class="section-card d-flex align-items-center gap-2">
      <label for="gameType" class="fw-bold text-nowrap">遊戲方式</label>
      <select id="gameType" class="form-select">
        <option value="number" selected>數字 BINGO</option>
        <option value="emt">EMT BINGO</option>
        <option value="battleship">海戰棋 Battleship</option>
      </select>
    </section>

    <section class="section-card board-wrap">
      <div id="gameBoard"></div>
    </section>

    <section class="section-card footer-area">
      <div>
        <div id="bingoStatus" class="line-count">
          目前 BINGO 連線數：<span id="lineCount">0</span> / 目標：<span id="targetLineText">5</span>
        </div>

        <div id="shipInfo" class="ship-info"></div>
      </div>

      <button id="btnStart" class="btn btn-primary btn-lg">
        <i class="fa-solid fa-play me-1"></i>開始遊戲
      </button>
    </section>
  </main>

  <div class="modal fade" id="settingModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">BINGO 設定</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">列</label>
              <input id="settingRows" type="number" class="form-control" min="2" max="10">
            </div>

            <div class="col-6">
              <label class="form-label">欄</label>
              <input id="settingCols" type="number" class="form-control" min="2" max="10">
            </div>

            <div class="col-6">
              <label class="form-label">最小值</label>
              <input id="settingMin" type="number" class="form-control">
            </div>

            <div class="col-6">
              <label class="form-label">最大值</label>
              <input id="settingMax" type="number" class="form-control">
            </div>

            <div class="col-12">
              <label class="form-label">完成連線數</label>
              <input id="settingTargetLines" type="number" class="form-control" min="1">
            </div>
          </div>

          <div class="alert alert-info mt-3 mb-0">
            設定不會儲存在本機。重新整理後會依照程式碼 defaultConfig 為主。
          </div>

          <div id="settingAlert" class="alert alert-danger mt-3 d-none"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="btnSaveSetting" class="btn btn-primary">套用設定</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/resize.js"></script>
  <script src="js/fireworks.js"></script>
  <script src="js/bingo.js"></script>
  <script src="js/battleship.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
